<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Downhill Madness</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏃</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #6fb7e8; touch-action: none; }
    body {
      font-family: ui-rounded, "SF Pro Rounded", system-ui, -apple-system, "Segoe UI", sans-serif;
      user-select: none; -webkit-user-select: none;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    /* ---------- HUD ---------- */
    #hud { position: fixed; inset: 0; pointer-events: none; color: #fff; }
    .hidden { display: none !important; }

    #distance {
      position: absolute; top: 3vh; left: 50%; transform: translateX(-50%);
      font-size: clamp(34px, 6vw, 64px); font-weight: 800; letter-spacing: 0.02em;
      text-shadow: 0 3px 0 rgba(52, 87, 46, 0.55), 0 6px 18px rgba(0,0,0,0.25);
    }
    #speedo {
      position: absolute; top: calc(3vh + clamp(40px, 6.6vw, 70px)); left: 50%; transform: translateX(-50%);
      font-size: clamp(13px, 2vw, 18px); font-weight: 700; opacity: 0.85;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }
    #styleScore {
      position: absolute; top: 3vh; right: 4vw; text-align: right;
      font-size: clamp(16px, 2.6vw, 26px); font-weight: 800;
      text-shadow: 0 2px 0 rgba(52,87,46,0.5), 0 4px 12px rgba(0,0,0,0.25);
    }
    #combo {
      position: absolute; top: calc(3vh + clamp(24px, 3.4vw, 34px)); right: 4vw;
      font-size: clamp(13px, 2vw, 18px); font-weight: 800; color: #ffd75e;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.15s;
    }
    .popup {
      position: absolute; transform: translate(-50%, -50%);
      font-weight: 900; font-size: clamp(16px, 2.6vw, 26px); white-space: nowrap;
      color: #fff7d6; text-shadow: 0 2px 0 rgba(120, 70, 20, 0.6), 0 5px 14px rgba(0,0,0,0.35);
      animation: popfloat 1.1s ease-out forwards;
    }
    .popup.big { font-size: clamp(22px, 3.6vw, 38px); color: #ffd75e; }
    @keyframes popfloat {
      0% { opacity: 0; margin-top: 10px; scale: 0.6; }
      12% { opacity: 1; scale: 1.15; }
      25% { scale: 1; }
      100% { opacity: 0; margin-top: -70px; scale: 1; }
    }

    /* ---------- Screens ---------- */
    .screen {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      color: #fff; pointer-events: auto;
    }
    #startScreen { background: linear-gradient(rgba(30,60,40,0) 55%, rgba(24, 48, 32, 0.45)); }
    .title {
      font-size: clamp(42px, 9vw, 110px); font-weight: 900; line-height: 0.95;
      letter-spacing: 0.01em; color: #fffbe8;
      text-shadow: 0 4px 0 #4a7c3f, 0 8px 0 rgba(43, 66, 39, 0.85), 0 14px 30px rgba(0,0,0,0.35);
      transform: rotate(-2deg);
    }
    .subtitle { margin-top: 2vh; font-size: clamp(15px, 2.4vw, 22px); font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.4); }
    .hint { margin-top: 4vh; font-size: clamp(13px, 2vw, 18px); font-weight: 700; opacity: 0.95; text-shadow: 0 2px 8px rgba(0,0,0,0.4); line-height: 1.7; }
    .pulse { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.65; } 50% { opacity: 1; } }
    .best { margin-top: 2.5vh; font-size: clamp(14px, 2vw, 19px); font-weight: 800; color: #ffd75e; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }

    #endScreen { background: rgba(25, 42, 28, 0.0); }
    .card {
      background: rgba(28, 46, 30, 0.82); border-radius: 22px; padding: 3.2vh 5vw;
      box-shadow: 0 14px 50px rgba(0,0,0,0.35), inset 0 0 0 3px rgba(255, 250, 220, 0.12);
      backdrop-filter: blur(4px); min-width: min(78vw, 460px);
    }
    .wipeout {
      font-size: clamp(34px, 7vw, 72px); font-weight: 900; color: #ffd75e;
      text-shadow: 0 3px 0 #a5551f, 0 8px 20px rgba(0,0,0,0.4); transform: rotate(-2deg);
      margin-bottom: 1.6vh;
    }
    .scoreline { display: flex; justify-content: space-between; gap: 5vw; font-size: clamp(14px, 2.2vw, 19px); font-weight: 700; padding: 0.45vh 0; opacity: 0.92; }
    .scoreline span:last-child { font-variant-numeric: tabular-nums; }
    .scoreline.total { border-top: 2px solid rgba(255,250,220,0.25); margin-top: 1.2vh; padding-top: 1.4vh; font-size: clamp(19px, 3vw, 27px); font-weight: 900; color: #fffbe8; opacity: 1; }
    .newbest { color: #ffd75e; font-weight: 900; font-size: clamp(15px, 2.4vw, 21px); margin-top: 1.2vh; animation: pulse 1s infinite; }

    #muteBtn {
      position: fixed; bottom: 2.4vh; right: 2.4vh; z-index: 30; pointer-events: auto;
      width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
      background: rgba(28, 46, 30, 0.55); color: #fff; font-size: 22px;
    }
    #fader { position: fixed; inset: 0; background: #fffbe8; opacity: 0; pointer-events: none; transition: opacity 0.35s; }
    #vignetteFx { position: fixed; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.3s;
      background: radial-gradient(ellipse at center, transparent 42%, rgba(56, 44, 8, 0.85) 100%); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="vignetteFx"></div>
  <div id="hud" class="hidden">
    <div id="distance">0 m</div>
    <div id="speedo">7 m/s</div>
    <div id="styleScore">STYLE 0</div>
    <div id="combo"></div>
  </div>
  <div id="startScreen" class="screen">
    <div class="title">DOWNHILL<br/>MADNESS</div>
    <div class="subtitle">He tripped. He can't stop. Good luck.</div>
    <div class="best hidden" id="startBest"></div>
    <div class="hint">
      <b>A/D</b> or <b>←/→</b> steer &nbsp;·&nbsp; <b>Space</b> jump &nbsp;·&nbsp; <b>S</b> spin (in air)<br/>
      touch: hold sides to steer · swipe ↑ to jump · tap in air to spin
    </div>
    <div class="hint pulse" id="startPrompt">press any key / tap to run</div>
  </div>
  <div id="endScreen" class="screen hidden">
    <div class="card">
      <div class="wipeout">WIPEOUT!</div>
      <div id="scoreLines"></div>
      <div class="newbest hidden" id="newBest">★ NEW BEST! ★</div>
      <div class="hint pulse" style="margin-top:2vh">press R / tap to run again</div>
    </div>
  </div>
  <button id="muteBtn" title="mute">🔊</button>
  <div id="fader"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
