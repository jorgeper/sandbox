services:
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - site
      - hank
      - hank-web

  site:
    build: site
    restart: unless-stopped

  hank:
    build: hank
    env_file: ${ENV_FILE:-hank/.env.local}
    restart: unless-stopped
    volumes:
      - hank_data:/app/data

  hank-web:
    build: hank-web
    env_file: ${WEB_ENV_FILE:-hank-web/.env.local}
    restart: unless-stopped
    volumes:
      - hank_data:/app/data:ro

volumes:
  caddy_data:
  hank_data:
  # Legacy volume kept so Docker doesn't error on existing deployments.
  # Data should be migrated from hank_memories to hank_data.
  hank_memories:
