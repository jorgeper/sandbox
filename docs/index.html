<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JorgePereira.io</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400&display=swap');

    :root {
      --bg: #f4f2ef;
      --warm: #2a2a3a;
      --warm-dim: rgba(42, 42, 58, 0.55);
      --warm-ghost: rgba(42, 42, 58, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--warm);
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ── Atmosphere layers ── */

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 42%, transparent 30%, rgba(244, 242, 239, 0.7) 100%);
    }



    .ambient {
      position: fixed;
      top: 18%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(600px, 80vw);
      height: 280px;
      background: radial-gradient(ellipse, rgba(110, 60, 150, 0.035), transparent 70%);
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      animation: fadeIn 4s ease 0.5s forwards;
    }

    /* ── Content ── */

    .content {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 8vh 2rem 2rem;
    }

    /* Name wrapper — hosts the light sweep */
    .name-wrap {
      position: relative;
      overflow: hidden;
      padding: 0.15em 0.6em;
    }

    .name-wrap::after {
      content: '';
      position: absolute;
      top: 0; left: -80%;
      width: 45%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,0.04), transparent);
      opacity: 0;
      animation: sweep 2.8s ease-in-out 2.2s forwards;
    }

    @keyframes sweep {
      0%   { left: -80%; opacity: 1; }
      100% { left: 200%; opacity: 0; }
    }

    /* Name — gradient shimmer text */
    .name {
      font-family: 'DM Sans', sans-serif;
      font-weight: 200;
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      line-height: 1.1;
      background: linear-gradient(
        90deg,
        #3a3a4e 0%, #1a1a2e 14%, #2a2a3e 28%,
        #1a1a2e 48%, #3a3a4e 62%, #1a1a2e 78%, #3a3a4e 100%
      );
      background-size: 300% 100%;
      background-position: 150% 0;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation:
        fadeUp 2.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards,
        shimmer 10s ease-in-out 3s infinite alternate;
    }


    /* ── Keyframes ── */

    @keyframes shimmer {
      to { background-position: -50% 0; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .nav-link {
      margin-top: 2rem;
      opacity: 0;
      animation: fadeUp 2s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
    }

    .nav-link a {
      color: var(--warm-dim);
      text-decoration: none;
      font-weight: 300;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .nav-link a:hover {
      color: var(--warm);
    }
  </style>
</head>
<body>

  <canvas id="cosmos"></canvas>
  <div class="vignette"></div>


  <div class="ambient"></div>

  <div class="content">
    <div class="name-wrap">
      <h1 class="name">JorgePereira.io</h1>
    </div>
    <div class="nav-link">
      <a href="demos.html">Demos</a>
    </div>
  </div>


  <script>
    const canvas = document.getElementById('cosmos');
    const ctx = canvas.getContext('2d');
    let W, H;

    let mouseX, mouseY, smoothMX, smoothMY;
    let mouseIn = false;

    // Name sits at ~8vh from top — wisps cluster tightly around it
    function nameCenter() { return { x: W / 2, y: H * 0.1 }; }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      if (!mouseIn) {
        mouseX = W / 2; mouseY = H * 0.1;
        smoothMX = W / 2; smoothMY = H * 0.1;
      }
    }

    /* ── Background nebula wisps (centered on name) ── */
    const BG_PALETTE = [
      [200, 50, 110],  [220, 60, 135], [25, 155, 210],
      [40, 110, 190],  [115, 40, 185], [75, 55, 170],
      [170, 35, 90],   [30, 80, 155],
    ];

    class Wisp {
      constructor() { this.reset(true); }

      reset(init) {
        const nc = nameCenter();
        this.x = nc.x + (Math.random() - 0.5) * W * 0.45;
        this.y = nc.y + (Math.random() - 0.5) * H * 0.14;
        this.radius = 80 + Math.random() * 180;
        this.life = init ? Math.random() * 600 : 0;
        this.maxLife = 420 + Math.random() * 480;
        this.vx = (Math.random() - 0.5) * 0.18;
        this.vy = (Math.random() - 0.5) * 0.06;
        this.angle = Math.random() * Math.PI * 2;
        this.aSpeed = 0.0018 + Math.random() * 0.004;
        this.color = BG_PALETTE[Math.floor(Math.random() * BG_PALETTE.length)];
        this.baseA = 0.038 + Math.random() * 0.055;
      }

      update() {
        this.life++;
        if (this.life > this.maxLife) { this.reset(false); return; }
        this.angle += this.aSpeed;

        const dx = this.x - smoothMX;
        const dy = this.y - smoothMY;
        const d = Math.hypot(dx, dy) || 1;
        const push = Math.max(0, 1 - d / 380) * 0.35;

        this.x += this.vx + Math.sin(this.angle) * 0.2 + (dx / d) * push;
        this.y += this.vy + Math.cos(this.angle * 0.7) * 0.08 + (dy / d) * push * 0.5;
        this.radius += 0.06;
      }

      draw() {
        const p = this.life / this.maxLife;
        let a = this.baseA;
        if (p < 0.15)     a *= p / 0.15;
        else if (p > 0.6) a *= (1 - p) / 0.4;

        const [r, g, b] = this.color;
        const rad = this.radius;
        const gr = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, rad);
        gr.addColorStop(0,    `rgba(${r},${g},${b},${a * 2.8})`);
        gr.addColorStop(0.25, `rgba(${r},${g},${b},${a * 1.6})`);
        gr.addColorStop(0.6,  `rgba(${r},${g},${b},${a * 0.4})`);
        gr.addColorStop(1,    `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = gr;
        ctx.fillRect(this.x - rad, this.y - rad, rad * 2, rad * 2);
      }
    }

    /* ── Mouse trail wisps — same palette, smoky and amorphous ── */

    class TrailWisp {
      constructor(x, y, velX, velY) {
        // Offset spawn from cursor + scatter along perpendicular to movement
        const perpX = -velY, perpY = velX;
        const spread = (Math.random() - 0.5) * 60;
        this.x = x + perpX * spread + (Math.random() - 0.5) * 20;
        this.y = y + perpY * spread + (Math.random() - 0.5) * 20;
        this.radius = 40 + Math.random() * 80;
        this.life = 0;
        this.maxLife = 140 + Math.random() * 200;
        // Drift away from cursor path + organic wander
        this.vx = perpX * (Math.random() - 0.5) * 0.8 + (Math.random() - 0.5) * 0.3;
        this.vy = perpY * (Math.random() - 0.5) * 0.8 + (Math.random() - 0.5) * 0.3 + 0.05;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 0.02 + Math.random() * 0.03;
        this.wobbleAmp = 0.15 + Math.random() * 0.3;
        this.color = BG_PALETTE[Math.floor(Math.random() * BG_PALETTE.length)];
        this.baseA = 0.012 + Math.random() * 0.018;
      }

      update() {
        this.life++;
        this.wobble += this.wobbleSpeed;
        this.x += this.vx + Math.sin(this.wobble) * this.wobbleAmp;
        this.y += this.vy + Math.cos(this.wobble * 0.7) * this.wobbleAmp * 0.6;
        this.vx *= 0.992;
        this.vy *= 0.992;
        this.radius += 0.5;
      }

      draw() {
        const p = this.life / this.maxLife;
        // Slow fade-in, long fade-out
        let a = this.baseA;
        if (p < 0.15)     a *= p / 0.15;
        else if (p > 0.4) a *= (1 - p) / 0.6;

        const [r, g, b] = this.color;
        const rad = this.radius;
        // Offset gradient center from shape center for non-circular look
        const ox = Math.sin(this.wobble * 1.3) * rad * 0.2;
        const oy = Math.cos(this.wobble * 0.9) * rad * 0.15;
        const gr = ctx.createRadialGradient(
          this.x + ox, this.y + oy, rad * 0.05,
          this.x, this.y, rad
        );
        gr.addColorStop(0,   `rgba(${r},${g},${b},${a * 1.5})`);
        gr.addColorStop(0.35,`rgba(${r},${g},${b},${a * 0.7})`);
        gr.addColorStop(0.7, `rgba(${r},${g},${b},${a * 0.15})`);
        gr.addColorStop(1,   `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = gr;
        ctx.fillRect(this.x - rad, this.y - rad, rad * 2, rad * 2);
      }

      dead() { return this.life >= this.maxLife; }
    }

    const trailWisps = [];
    let lastTrailX = -1, lastTrailY = -1;
    let prevMX = 0, prevMY = 0;

    /* ── Init ── */
    resize();
    window.addEventListener('resize', resize);

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      mouseIn = true;

      const dx = mouseX - lastTrailX;
      const dy = mouseY - lastTrailY;
      const dist = Math.hypot(dx, dy);
      if (dist > 15 && trailWisps.length < 80) {
        // Normalized velocity direction for perpendicular scatter
        const len = dist || 1;
        const vx = dx / len, vy = dy / len;
        // Spawn 2-3 wisps per step for denser, overlapping smoke
        const count = 2 + Math.floor(Math.random() * 2);
        for (let i = 0; i < count; i++) {
          trailWisps.push(new TrailWisp(mouseX, mouseY, vx, vy));
        }
        lastTrailX = mouseX;
        lastTrailY = mouseY;
      }
    });
    document.addEventListener('mouseleave', () => { mouseIn = false; });

    const wisps = Array.from({ length: 14 }, () => new Wisp());


    /* ── Render ── */
    let frame = 0;

    function render() {
      frame++;

      smoothMX += (mouseX - smoothMX) * 0.055;
      smoothMY += (mouseY - smoothMY) * 0.055;

      if (!mouseIn) {
        mouseX += (W / 2 - mouseX) * 0.01;
        mouseY += (H * 0.1 - mouseY) * 0.01;
      }

      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = 'lighter';

      // ── Background wisps ──
      for (const w of wisps) {
        w.update();
        w.draw();
      }

      // ── Mouse trail wisps ──
      for (let i = trailWisps.length - 1; i >= 0; i--) {
        trailWisps[i].update();
        trailWisps[i].draw();
        if (trailWisps[i].dead()) trailWisps.splice(i, 1);
      }

      // ── Mouse glow ──
      if (mouseIn) {
        const mg = ctx.createRadialGradient(smoothMX, smoothMY, 0, smoothMX, smoothMY, 180);
        mg.addColorStop(0, 'rgba(140, 200, 210, 0.016)');
        mg.addColorStop(1, 'rgba(140, 200, 210, 0)');
        ctx.fillStyle = mg;
        ctx.fillRect(smoothMX - 180, smoothMY - 180, 360, 360);
      }

      ctx.globalCompositeOperation = 'source-over';
      requestAnimationFrame(render);
    }

    render();
  </script>
</body>
</html>
