# The outer loop: validate every PR in a clean VM; release on merge to main.
# The validate steps mirror the inner loop deliberately — same checks, cleaner
# room. Adapt the install/lint/test commands to your stack.
name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e . && pip install pytest ruff
      - run: ruff check .
      - run: pytest -q          # external services are mocked in tests — CI is hermetic
  release:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploying 🎉 (placeholder for fly deploy / docker push)"
