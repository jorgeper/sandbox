name: Build and push workout-app Docker image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "workout-app/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: workout-app
          push: true
          tags: ghcr.io/jorgeper/workout-app:latest
