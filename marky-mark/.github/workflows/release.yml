# Marky Mark release pipeline (SPEC10 §5): tag push (marky-mark-v*) or manual
# dispatch → full validate gate + version check → three platform builds →
# draft GitHub Release with SHA256SUMS. Nothing auto-publishes; a human
# smoke-tests the draft and flips it live (see RELEASING.md).
#
# This app-local copy is canonical. GitHub only executes workflows from the
# repository root, so in the jorgeper/sandbox monorepo it is activated by
# copying to .github/workflows/marky-mark-release.yml (RELEASING.md documents
# the one-time step). If marky-mark is ever extracted to its own repo, drop
# the `working-directory` defaults and the marky-mark/ path prefixes.
name: marky-mark-release

on:
  push:
    tags: ['marky-mark-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to dry-run (e.g. 0.2.0-alpha.2); produces a draft prerelease'
        required: true
        type: string

concurrency:
  group: marky-mark-release-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: marky-mark

jobs:
  test:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: marky-mark/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: marky-mark/src-tauri
      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#marky-mark-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Version check (no silent drift)
        run: |
          v="${{ steps.version.outputs.version }}"
          fail=0
          for f in package.json src-tauri/tauri.conf.json; do
            got=$(node -p "JSON.parse(require('fs').readFileSync('$f','utf8')).version")
            if [ "$got" != "$v" ]; then echo "::error::$f has $got, releasing $v"; fail=1; fi
          done
          got=$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -1)
          if [ "$got" != "$v" ]; then echo "::error::src-tauri/Cargo.toml has $got, releasing $v"; fail=1; fi
          exit $fail
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run validate

  build-macos:
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: marky-mark/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: marky-mark/src-tauri
      - run: npm ci
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: marky-mark/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: marky-mark/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: marky-mark/src-tauri
      - run: npm ci
      - run: npm run tauri build -- --bundles nsis
      - uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: marky-mark/src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  build-web:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: marky-mark/package-lock.json
      - run: npm ci
      - run: npm run build:web
      - name: Self-describing asset name
        run: mv dist-web/index.html "dist-web/marky-mark-web-${{ needs.test.outputs.version }}.html"
      - uses: actions/upload-artifact@v4
        with:
          name: web-html
          path: marky-mark/dist-web/marky-mark-web-*.html
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [test, build-macos, build-windows, build-web]
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.test.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: marky-mark/release-assets
          merge-multiple: true
      - name: Asset guard (all present, none over 25 MB)
        run: |
          cd release-assets
          ls -l
          [ "$(ls *.dmg *-setup.exe *.html 2>/dev/null | wc -l)" -eq 3 ] || { echo "::error::expected exactly dmg + setup.exe + html"; exit 1; }
          for f in *; do
            size=$(wc -c < "$f")
            if [ "$size" -gt 26214400 ]; then echo "::error::$f is $size bytes (> 25 MB)"; exit 1; fi
          done
      - name: Checksums
        run: cd release-assets && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt
      - name: Release notes header
        run: |
          cat > release-assets/NOTES.md <<'EOF'
          **Alpha, unsigned builds** — expect rough edges.

          | Asset | What it is |
          | --- | --- |
          | `Marky Mark_*_aarch64.dmg` | macOS app (Apple Silicon). Unsigned: right-click → Open, or `xattr -dc "/Applications/Marky Mark.app"`. |
          | `Marky Mark_*_x64-setup.exe` | Windows installer (x64). Unsigned: SmartScreen → More info → Run anyway. |
          | `marky-mark-web-*.html` | The whole app in one file — download and open, or host anywhere static. |
          | `SHA256SUMS.txt` | Checksums for the three assets above. |
          EOF
      - name: Create draft release
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            gh release create "$GITHUB_REF_NAME" --draft --generate-notes \
              --title "Marky Mark $VERSION" --notes-file release-assets/NOTES.md \
              release-assets/*.dmg release-assets/*-setup.exe release-assets/*.html release-assets/SHA256SUMS.txt
          else
            gh release create "marky-mark-v$VERSION" --draft --prerelease --target "$GITHUB_SHA" \
              --title "Marky Mark $VERSION" --notes-file release-assets/NOTES.md \
              release-assets/*.dmg release-assets/*-setup.exe release-assets/*.html release-assets/SHA256SUMS.txt
          fi
